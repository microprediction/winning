name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[benchmarks]" pytest
      - name: Test
        run: python -m pytest -q

  test-minimal:
    # the core must import and pass core tests with only thurstone installed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core only
        run: pip install -e . pytest
      - name: Core tests
        run: python -m pytest -q tests/test_exact.py tests/test_thurstonerating.py tests/test_ratingsystems.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff
        run: |
          pip install ruff
          ruff check src tests
